<div class="url-input-wrapper">
  <div class="url-input-hero">
    <div class="hero-icon">
      <mat-icon>video_library</mat-icon>
    </div>
    <h2 class="hero-title">Video Vault Downloader</h2>
    <p class="hero-subtitle">Paste any YouTube (or supported site) link to fetch video info and download in your preferred format.</p>
  </div>

  <div class="input-row">
    <mat-form-field appearance="outline" class="url-field">
      <mat-label>Paste video URL</mat-label>
      <input
        matInput
        [(ngModel)]="url"
        (paste)="onPaste($event)"
        (keydown.enter)="onFetch()"
        placeholder="https://www.youtube.com/watch?v=..."
        [disabled]="loading()"
        autocomplete="off"
      />
      @if (url) {
        <button matSuffix mat-icon-button aria-label="Clear" (click)="clearUrl()" [disabled]="loading()">
          <mat-icon>close</mat-icon>
        </button>
      }
    </mat-form-field>

    <button
      mat-flat-button
      color="primary"
      class="fetch-btn"
      (click)="onFetch()"
      [disabled]="!url.trim() || loading()"
    >
      @if (loading()) {
        <ng-container>
          <mat-spinner diameter="20" color="accent"></mat-spinner>
          <span>Fetching…</span>
        </ng-container>
      } @else {
        <ng-container>
          <mat-icon>search</mat-icon>
          <span>Fetch Info</span>
        </ng-container>
      }
    </button>
  </div>

  <div class="supported-sites">
    <span class="site-chip"><mat-icon>smart_display</mat-icon> YouTube</span>
    <span class="site-chip"><mat-icon>videocam</mat-icon> Vimeo</span>
    <span class="site-chip"><mat-icon>live_tv</mat-icon> Twitch</span>
    <span class="site-chip">+ 1000 more sites via yt-dlp</span>
  </div>
</div>
